<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admissions - School ERP</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

  <link rel="stylesheet" href="../style.css" />
  <style>
    body{background:rgba(27,42,74,.04)}
    .badge-pending{background:rgba(245,158,11,.15); color:rgba(245,158,11,.95); border:1px solid rgba(245,158,11,.35)}
    .badge-under-review{background:rgba(59,130,246,.15); color:rgba(59,130,246,.95); border:1px solid rgba(59,130,246,.35)}
    .badge-approved{background:rgba(34,197,94,.15); color:rgba(34,197,94,.95); border:1px solid rgba(34,197,94,.35)}
    .badge-rejected{background:rgba(239,68,68,.15); color:rgba(239,68,68,.95); border:1px solid rgba(239,68,68,.35)}
    .badge-waitlisted{background:rgba(249,115,22,.18); color:rgba(249,115,22,.95); border:1px solid rgba(249,115,22,.35)}

    .table-modern td, .table-modern th{ vertical-align: middle }
    .glass-panel{background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.10); border-radius:18px;}
  </style>
</head>
<body>
  <div class="app-shell d-flex">
    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar d-flex flex-column vh-100 position-sticky top-0">
      <div class="sidebar-brand">
        <div class="brand-mark">🏫</div>
        <div class="brand-text">
          <strong>School ERP</strong>
          <span>Admin Console</span>
        </div>
      </div>

      <div class="px-2 pb-3">
        <div class="d-flex gap-2">
          <button class="btn btn-sm btn-soft rounded-pill" onclick="DashUI.sidebarToggle()" title="Collapse sidebar">
            <i class="fa-solid fa-bars"></i>
          </button>
        </div>
      </div>

      <div class="sidebar-nav nav flex-column gap-1 px-2 pb-3" style="overflow:auto;">
        <a class="nav-link" href="#" data-nav="dashboard" onclick="AppViews.render('dashboard')">
          <i class="fa-solid fa-gauge-high"></i>
          <span>Dashboard</span>
        </a>

        <a class="nav-link" href="./students.html" data-nav="students">
          <i class="fa-solid fa-user-graduate"></i>
          <span>Students</span>
        </a>

        <a class="nav-link" href="./admissions.html" data-nav="admissions">
          <i class="fa-solid fa-file-signature"></i>
          <span>Admissions</span>
        </a>

        <a class="nav-link" href="#" onclick="adminNavigate('attendance')">
          <i class="fa-solid fa-calendar-check"></i>
          <span>Attendance</span>
        </a>

        <a class="nav-link" href="#" onclick="adminNavigate('classes')">
          <i class="fa-solid fa-layer-group"></i>
          <span>Classes</span>
        </a>

        <a class="nav-link" href="#" onclick="adminNavigate('subjects')">
          <i class="fa-solid fa-book"></i>
          <span>Subjects</span>
        </a>

        <a class="nav-link" href="#" onclick="adminNavigate('teachers')">
          <i class="fa-solid fa-chalkboard-user"></i>
          <span>Teachers</span>
        </a>

        <a class="nav-link mt-2" href="#" onclick="DashUI.logout()">
          <i class="fa-solid fa-right-from-bracket"></i>
          <span>Logout</span>
        </a>
      </div>
    </nav>

    <main class="main flex-fill">
      <div class="topbar py-3">
        <div class="container-fluid px-3 px-md-4">
          <div class="d-flex align-items-center gap-3">
            <div class="flex-grow-1">
              <h4 class="m-0 glass-title"><i class="fa-solid fa-file-signature me-2"></i>Admissions</h4>
            </div>
            <div>
              <button class="btn btn-success rounded-pill" onclick="location.href='new-admission.html'">
                <i class="fa-solid fa-plus me-2"></i>New Admission
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="container-fluid">
        <div class="p-3 p-md-4">
          <div class="glass-panel p-3 p-md-4">
            <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
              <div class="text-muted" style="color:rgba(27,42,74,.65)!important; font-weight:800;">Manage admission applications</div>
              <div class="d-flex gap-2">
                <button class="btn btn-soft rounded-pill" id="btnExportCsv"><i class="fa-solid fa-file-export me-2"></i>Export CSV</button>
              </div>
            </div>

            <div class="row g-2">
              <div class="col-12 col-md-4">
                <input id="q" class="form-control" placeholder="Search by Application No / Name" />
              </div>
              <div class="col-6 col-md-2">
                <select id="status" class="form-select">
                  <option value="">All Status</option>
                  <option value="pending">Pending</option>
                  <option value="under_review">Under Review</option>
                  <option value="approved">Approved</option>
                  <option value="rejected">Rejected</option>
                  <option value="waitlisted">Waitlisted</option>
                </select>
              </div>
              <div class="col-6 col-md-2">
                <input id="class_applying_for" class="form-control" placeholder="Class (e.g., Class 1)" />
              </div>
              <div class="col-12 col-md-3">
                <input id="academic_year" class="form-control" placeholder="Academic Year (e.g., 2024-25)" />
              </div>
              <div class="col-12">
                <div class="d-flex gap-2">
                  <button class="btn btn-accent rounded-pill" onclick="loadAdmissions(1)"><i class="fa-solid fa-magnifying-glass me-2"></i>Filter</button>
                  <button class="btn btn-soft rounded-pill" onclick="resetFilters()"><i class="fa-solid fa-rotate me-2"></i>Reset</button>
                </div>
              </div>
            </div>

            <div class="table-responsive mt-3">
              <table class="table table-modern" style="color:var(--lightText)">
                <thead>
                  <tr>
                    <th>Application No</th>
                    <th>Student Name</th>
                    <th>Class</th>
                    <th>Applied Date</th>
                    <th>Status</th>
                    <th style="width:170px;">Actions</th>
                  </tr>
                </thead>
                <tbody id="tblAdmissions">
                  <tr><td colspan="6" class="text-center text-muted py-4">Loading…</td></tr>
                </tbody>
              </table>
            </div>

            <div class="d-flex align-items-center justify-content-between mt-3">
              <div class="text-muted" id="countText">—</div>
              <div class="d-flex gap-2">
                <button class="btn btn-soft rounded-pill" id="btnPrev" onclick="pagePrev()">Prev</button>
                <button class="btn btn-soft rounded-pill" id="btnNext" onclick="pageNext()">Next</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../script.js"></script>
  <script>
    DashUI.ensureRole('admin');
    DashUI.hydrateSidebarCollapse();

    let state = { page: 1, limit: 10, total: 0 };

    function badgeHtml(status){
      const s = (status||'pending');
      const map = {
        pending: 'badge-pending',
        under_review: 'badge-under-review',
        approved: 'badge-approved',
        rejected: 'badge-rejected',
        waitlisted: 'badge-waitlisted'
      };
      const cls = map[s] || 'badge-pending';
      const label = ({
        pending:'Pending',
        under_review:'Under Review',
        approved:'Approved',
        rejected:'Rejected',
        waitlisted:'Waitlisted'
      })[s] || s;
      return `<span class="badge ${cls} rounded-pill">${label}</span>`;
    }

    async function apiCall(endpoint, options = {}){
      return DashAPI.apiCall(endpoint, options);
    }

    function setStatusMenu(status){
      // just helper
      return status;
    }

    async function loadAdmissions(page){
      const params = new URLSearchParams();
      params.set('page', page);
      params.set('limit', state.limit);
      const qVal = document.getElementById('q').value.trim();
      const stVal = document.getElementById('status').value;
      const clsVal = document.getElementById('class_applying_for').value.trim();
      const yrVal = document.getElementById('academic_year').value.trim();
      if(qVal) params.set('search', qVal);
      if(stVal) params.set('status', stVal);
      if(clsVal) params.set('class_applying_for', clsVal);
      if(yrVal) params.set('academic_year', yrVal);

      const tbody = document.getElementById('tblAdmissions');
      tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-4">Loading…</td></tr>`;

      const data = await apiCall(`/admissions?${params.toString()}`);
      state.total = data.total || 0;
      state.page = data.page || page;

      document.getElementById('countText').textContent = `Showing ${data.items?.length || 0} of ${state.total} records`;

      const items = data.items || [];
      tbody.innerHTML = items.map(item => {
        const studentName = `${item.student_first_name || ''} ${item.student_last_name || ''}`.trim() || '—';
        const appliedDate = item.applied_date ? new Date(item.applied_date).toLocaleDateString() : '—';

        const actions = `
          <div class="d-flex gap-2 align-items-center">
            <a class="btn btn-sm btn-soft rounded-pill" href="new-admission-view.html?id=${item.id}" title="View">
              <i class="fa-solid fa-eye"></i>
            </a>

            <div class="dropdown">
              <button class="btn btn-sm btn-soft dropdown-toggle rounded-pill" data-bs-toggle="dropdown">Status</button>
              <ul class="dropdown-menu">
                ${['approved','rejected','under_review','waitlisted'].map(s => {
                  const label = (s==='under_review') ? 'Under Review' : (s==='waitlisted') ? 'Waitlisted' : (s.charAt(0).toUpperCase()+s.slice(1));
                  return `<li><a class="dropdown-item" href="#" onclick="setStatus(${item.id},'${s}')">${label}</a></li>`;
                }).join('')}
              </ul>
            </div>

            <button class="btn btn-sm btn-danger rounded-pill" title="Delete" onclick="del(${item.id})">
              <i class="fa-solid fa-trash"></i>
            </button>
          </div>
        `;

        return `
          <tr>
            <td class="fw-bold">${item.application_no}</td>
            <td>${studentName}</td>
            <td>${item.class_applying_for || '—'}</td>
            <td>${appliedDate}</td>
            <td>${badgeHtml(item.status)}</td>
            <td>${actions}</td>
          </tr>
        `;
      }).join('');

      syncPager();
    }

    function syncPager(){
      document.getElementById('btnPrev').disabled = state.page <= 1;
      document.getElementById('btnNext').disabled = (state.page * state.limit) >= (state.total || 0);
    }

    function pagePrev(){ if(state.page>1) loadAdmissions(state.page-1); }
    function pageNext(){ loadAdmissions(state.page+1); }

    function resetFilters(){
      document.getElementById('q').value='';
      document.getElementById('status').value='';
      document.getElementById('class_applying_for').value='';
      document.getElementById('academic_year').value='';
      loadAdmissions(1);
    }

    async function setStatus(id, status){
      const rejection_reason = status==='rejected' ? (prompt('Rejection reason (required):') || '') : '';
      if(status==='rejected' && !rejection_reason.trim()){
        alert('Rejection reason is required');
        return;
      }

      await apiCall(`/admissions/${id}/status`, {
        method: 'PUT',
        body: JSON.stringify({ status, rejection_reason: rejection_reason || null })
      });
      await loadAdmissions(state.page);
    }

    async function del(id){
      if(!confirm('Delete this application?')) return;
      await apiCall(`/admissions/${id}`, { method:'DELETE' });
      await loadAdmissions(state.page);
    }

    document.getElementById('btnExportCsv').addEventListener('click', ()=>{
      alert('CSV export UI is a stub. Backend export can be added later.');
    });

    loadAdmissions(1);
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
