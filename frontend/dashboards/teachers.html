<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teachers - School ERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/dashboards/staff-module.css" />
</head>
<body>
  <div class="app-shell d-flex">
    <nav id="sidebar" class="sidebar d-flex flex-column vh-100 position-sticky top-0">
      <div class="sidebar-brand"><div class="brand-mark">ERP</div><div class="brand-text"><strong>School ERP</strong><span>Admin Console</span></div></div>
      <div class="px-2 pb-3"><button class="btn btn-sm btn-soft rounded-pill" onclick="DashUI.sidebarToggle()" title="Collapse sidebar"><i class="fa-solid fa-bars"></i></button></div>
      <div class="sidebar-nav nav flex-column gap-1 px-2 pb-3" style="overflow:auto;">
        <a class="nav-link" href="./admin-dashboard.html"><i class="fa-solid fa-gauge-high"></i><span>Dashboard</span></a>
        <a class="nav-link" href="/staff"><i class="fa-solid fa-users"></i><span>Staff Directory</span></a>
        <a class="nav-link" href="/staff/add"><i class="fa-solid fa-user-plus"></i><span>Add Staff</span></a>
        <a class="nav-link active" href="/teachers"><i class="fa-solid fa-chalkboard-user"></i><span>Teachers</span></a>
        <a class="nav-link mt-2" href="#" onclick="DashUI.logout()"><i class="fa-solid fa-right-from-bracket"></i><span>Logout</span></a>
      </div>
    </nav>
    <main class="main flex-fill">
      <div class="topbar py-3">
        <div class="container-fluid px-3 px-md-4 d-flex align-items-center justify-content-between gap-3 flex-wrap">
          <div><h4 class="m-0 staff-page-title"><i class="fa-solid fa-chalkboard-user me-2"></i>Teachers</h4><div class="staff-muted">Faculty, professors, HODs, lab instructors, and teaching staff.</div></div>
          <div class="d-flex gap-2 flex-wrap"><span class="staff-badge" id="recordCount">0 records</span><a class="btn btn-accent rounded-pill" href="/staff/add"><i class="fa-solid fa-user-plus me-2"></i>Add Teacher</a></div>
        </div>
      </div>
      <div class="container-fluid"><div class="main-inner"><div class="p-3 p-md-4">
        <div class="row g-3 mb-3" id="staffStats"></div>
        <div class="staff-shell-panel p-3 mb-3">
          <div class="staff-toolbar">
            <input class="form-control" id="staffSearch" placeholder="Search faculty by name, subject, department..." />
            <select class="form-select" id="departmentFilter"><option value="">All departments</option></select>
            <select class="form-select" id="designationFilter"><option value="">All designations</option></select>
            <select class="form-select" id="statusFilter"><option value="">All statuses</option></select>
            <div class="d-flex gap-2 flex-wrap">
              <button class="btn btn-soft staff-action-btn" id="tableViewBtn" title="Table view"><i class="fa-solid fa-table"></i></button>
              <button class="btn btn-soft staff-action-btn" id="gridViewBtn" title="Faculty cards"><i class="fa-solid fa-grip"></i></button>
              <button class="btn btn-soft staff-action-btn" id="csvBtn" title="Export CSV"><i class="fa-solid fa-file-csv"></i></button>
              <button class="btn btn-soft staff-action-btn" id="excelBtn" title="Export Excel"><i class="fa-solid fa-file-excel"></i></button>
            </div>
          </div>
        </div>
        <div id="directoryMount"></div>
        <div class="d-flex justify-content-end align-items-center gap-2 mt-3" id="paginationMount"></div>
      </div></div></div>
    </main>
  </div>
  <script src="/script.js"></script>
  <script>window.STAFF_MODULE_MODE = 'teachers';</script>
  <script src="/dashboards/staff-module.js"></script>
</body>
</html>
