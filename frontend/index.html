<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School ERP - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo h1 {
      color: #333;
      font-size: 2rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #555;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 5px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
    }
    .demo-users {
      margin-top: 1.5rem;
      text-align: center;
    }
    .demo-user {
      background: #f8f9fa;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .demo-user:hover {
      background: #e9ecef;
    }
    .error {
      color: #e74c3c;
      text-align: center;
      margin-top: 1rem;
      padding: 10px;
      background: #fdf2f2;
      border-radius: 5px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>🏫 School ERP</h1>
      <p>Simple School Management System</p>
    </div>
    
    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required>
      </div>
      
      <button type="submit">Login</button>
    </form>
    
    <div id="errorMsg" class="error"></div>
    

  </div>

  <script>
    // Backend API base URL
    const API_BASE = 'http://localhost:5000/api';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      
      try {
const response = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Login failed');
        }

        // Store token and user info
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        // Redirect based on role
        switch(data.user.role) {
  case 'student':
    window.location.href = '/dashboards/student-dashboard.html';
    break;
  case 'staff':
    window.location.href = '/dashboards/staff-dashboard.html';
    break;
  case 'principal':
    window.location.href = '/dashboards/principal-dashboard.html';
    break;
  case 'admin':
    window.location.href = '/dashboards/admin-dashboard.html';
    break;
}
      } catch (error) {
        errorMsg.textContent = error.message;
        errorMsg.style.display = 'block';
      }
    });

    // Demo user fill function
    function fillDemo(role, email, password) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = password;
    }
  </script>
</body>
</html>
